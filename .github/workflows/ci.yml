name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Pin npm version from packageManager
        shell: bash
        run: |
          set -euo pipefail
          npm_version="$(node -p "const pm=require('./package.json').packageManager||''; if (!pm.startsWith('npm@')) throw new Error('Expected npm packageManager'); pm.slice(4)")"
          npm install --global "npm@${npm_version}"
          npm --version

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Audit runtime dependencies
        run: npm run audit:npm

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify public package contents
        run: npm run pack:check
