name: Monthly npm audit fix

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Pin npm version from packageManager
        shell: bash
        run: |
          set -euo pipefail
          npm_version="$(node -p "const pm=require('./package.json').packageManager||''; if (!pm.startsWith('npm@')) throw new Error('Expected npm packageManager'); pm.slice(4)")"
          npm install --global "npm@${npm_version}"
          npm --version

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Apply npm audit fix
        run: npm audit fix --package-lock-only

      - name: Build
        run: npm run build --if-present

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: monthly npm audit fix"
          title: "chore: monthly npm audit fix"
          body: |
            Automated `npm audit fix --package-lock-only` run.
            Please review dependency changes and adjust if a forced upgrade is needed.
          branch: chore/npm-audit-fix
          delete-branch: true
